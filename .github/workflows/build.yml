name: Build EXE
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.${{ github.run_number }}
          releaseName: 'Pro JSON Tool Build ${{ github.run_number }}'
          releaseBody: 'Download your .exe from the Assets section below.'
          releaseDraft: false
          prerelease: false
